<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Way Clans - MiniApp</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/buildings.css">
  <link rel="stylesheet" href="css/quests.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/market.css">
  <link rel="stylesheet" href="css/barracks.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-container">
    <div class="resources-header">
      <div class="resource-item">
        <span class="resource-icon">💰</span>
        <span class="resource-value" id="gold-value">5 000</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">🌲</span>
        <span class="resource-value" id="wood-value">2 500</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">🪨</span>
        <span class="resource-value" id="stone-value">2 500</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">🍖</span>
        <span class="resource-value" id="meat-value">500</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">💎</span>
        <span class="resource-value" id="jabcoins-value">0</span>
      </div>
    </div>

    <div class="pages-container">
      <div id="main-page" class="page">
        <!-- ... существующий контент ... -->
        <div class="player-card">
          <div class="player-header">
            <h2 id="player-name">PlayerName</h2>
          </div>
          <div class="player-info">
            <div class="player-avatar">
              <div class="avatar-placeholder" id="avatar-image">🧑</div>
              <span id="player-username">@username</span>
            </div>
            <div class="player-id">
              ID: <span id="player-id">123456789</span>
            </div>
          </div>
        </div>

        <div class="action-buttons action-buttons-grid">
          <button class="btn btn-storage" id="storage-btn">📦 Склад</button>
          <button class="btn btn-exchange" id="exchange-btn">💱 Обмен</button>
        </div>

        <div class="action-buttons action-buttons-grid">
          <button class="btn btn-treasury" id="treasury-btn">🏰 Казна</button>
          <button class="btn btn-market" id="market-btn">🛍 Рынок</button>
        </div>

        <div class="action-buttons">
          <button class="btn btn-quests" id="quests-btn">📋 Задания</button>
        </div>

        <div class="action-buttons">
          <button class="btn btn-attack" id="attack-btn">⚔️ Атаковать</button>
        </div>
      </div>

      <div id="mining-page" class="page">
        <div class="building-tabs">
          <button class="tab-btn active" data-type="mine">⛏ Шахты</button>
          <button class="tab-btn" data-type="quarry">🪨 Каменоломня</button>
          <button class="tab-btn" data-type="lumber_mill">🌲 Лесопилка</button>
          <button class="tab-btn" data-type="farm">🍖 Ферма</button>
        </div>
        <div class="buildings-container" id="buildings-container"></div>
      </div>

      <div id="coin-mining-page" class="page">
        <!-- ... существующий контент ... -->
        <div class="coin-mining-header">
          <div class="jamcoin-earned">
            <p class="earned-label">Заработано Jamcoin:</p>
            <p class="earned-amount" id="jamcoin-earned-display">0</p>
          </div>
        </div>
        <div class="coin-button-container">
          <div class="coin-wrapper">
            <button class="btn btn-coin" id="coin-btn">💰</button>
            <p class="coin-label">1 клик - 100 Jamcoin</p>
          </div>
        </div>
        <div class="coin-mining-stats">
          <div class="clicks-earned">
            <p class="clicks-label">Jamcoin от кликов:</p>
            <p class="clicks-amount" id="jamcoins-from-clicks-display">0</p>
          </div>
        </div>
      </div>

      <div id="market-page" class="page">
        <!-- ... существующий контент ... -->
        <div class="market-tabs">
          <button class="market-tab-btn active" data-resource="wood">🌲 Дерево</button>
          <button class="market-tab-btn" data-resource="stone">🪨 Камень</button>
          <button class="market-tab-btn" data-resource="meat">🍖 Мясо</button>
          <button class="market-tab-btn" data-resource="my-listings">📋 Мои объявления</button>
        </div>
        <div class="market-listings-container" id="market-listings-container"></div>
      </div>

      <!-- Barracks Page -->
      <div id="barracks-page" class="page">
        <div class="barracks-tabs">
          <button class="tab-btn active" data-barracks-tab="attacker">⚔️ Атакующий</button>
          <button class="tab-btn" data-barracks-tab="defender">🛡 Защитник</button>
          <button class="tab-btn" data-barracks-tab="my-army">🎖 Мои воины</button>
        </div>
        <div class="barracks-container" id="barracks-container">
          <!-- Content dynamically built -->
        </div>
      </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" id="nav-main">🏠 Главная</button>
      <button class="nav-item" id="nav-mining">⛏ Добыча</button>
      <button class="nav-item" id="nav-coin-mining">⛏ Майнинг</button>
      <button class="nav-item" id="nav-barracks">🛡 Казарма</button>
      <button class="nav-item" id="nav-market-back" style="display:none; flex: 1;">👈 Назад на главную</button>
    </nav>
  </div>

  <!-- Modals ... -->
  <!-- (Keep existing modals) -->
  
  <script type="module" src="app.js"></script>
</body>
</html>
